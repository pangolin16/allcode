<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Polska Editable DCF</title>
    <style>
        :root {
            --primary: #c8102e; /* Dino Red */
            --secondary: #2f4f4f;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-dark: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar for Inputs */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid var(--border);
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }

        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .result-banner {
            background: linear-gradient(135deg, #c8102e 0%, #a00d25 100%);
            color: white;
            text-align: center;
            padding: 40px;
        }

        .intrinsic-value {
            font-size: 3.5rem;
            font-weight: 900;
            color: #fbbf24; /* Gold */
            margin: 10px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            font-size: 0.8rem;
            color: #64748b;
            border-bottom: 2px solid var(--border);
            padding: 12px;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-variant-numeric: tabular-nums;
        }

        h2 { margin-top: 0; font-size: 1.2rem; color: var(--secondary); }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2 style="color: var(--primary);">Model Editor</h2>
    <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 20px;">
    
    <div class="input-group">
        <label>2024 Revenue (PLN M)</label>
        <input type="number" id="baseRev" value="29274">
    </div>
    <div class="input-group">
        <label>Annual Growth Rate (%)</label>
        <input type="number" id="growth" value="14.5">
    </div>
    <div class="input-group">
        <label>FCF Margin (%)</label>
        <input type="number" id="margin" value="4.5">
    </div>
    <div class="input-group">
        <label>Discount Rate / WACC (%)</label>
        <input type="number" id="wacc" value="9.0">
    </div>
    <div class="input-group">
        <label>Exit FCF Multiple (x)</label>
        <input type="number" id="multiple" value="22">
    </div>
    <div class="input-group">
        <label>Net Debt (PLN M)</label>
        <input type="number" id="debt" value="196">
    </div>
    <div class="input-group">
        <label>Shares Outstanding (M)</label>
        <input type="number" id="shares" value="98.04">
    </div>
</aside>

<main class="main-content">
    <div class="card result-banner">
        <h2>Dino Polska Estimated Intrinsic Value</h2>
        <div class="intrinsic-value" id="priceDisplay">0.00 PLN</div>
        <p id="evDisplay" style="opacity: 0.9;">Enterprise Value: 0 PLN</p>
    </div>

    <div class="card">
        <h2>5-Year Growth Projection</h2>
        <table id="projTable">
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Revenue</th>
                    <th>Free Cash Flow</th>
                    <th>Present Value</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</main>

<script>
    const inputs = ['baseRev', 'growth', 'margin', 'wacc', 'multiple', 'debt', 'shares'];

    function updateModel() {
        const rev = parseFloat(document.getElementById('baseRev').value);
        const growth = parseFloat(document.getElementById('growth').value) / 100;
        const margin = parseFloat(document.getElementById('margin').value) / 100;
        const wacc = parseFloat(document.getElementById('wacc').value) / 100;
        const mult = parseFloat(document.getElementById('multiple').value);
        const debt = parseFloat(document.getElementById('debt').value);
        const shares = parseFloat(document.getElementById('shares').value);

        let totalPVFCF = 0;
        let currentRev = rev;
        let tableHTML = '';

        for (let i = 1; i <= 5; i++) {
            currentRev *= (1 + growth);
            const fcf = currentRev * margin;
            const pv = fcf / Math.pow((1 + wacc), i);
            totalPVFCF += pv;

            tableHTML += `<tr>
                <td>Year ${i}</td>
                <td>${Math.round(currentRev).toLocaleString()} M</td>
                <td>${Math.round(fcf).toLocaleString()} M</td>
                <td>${Math.round(pv).toLocaleString()} M</td>
            </tr>`;

            if (i === 5) {
                const tv = fcf * mult;
                const pvTV = tv / Math.pow((1 + wacc), 5);
                const ev = totalPVFCF + pvTV;
                const equityValue = ev - debt;
                const price = equityValue / shares;

                document.getElementById('priceDisplay').innerText = `${price.toFixed(2)} PLN`;
                document.getElementById('evDisplay').innerText = `Enterprise Value: ${Math.round(ev).toLocaleString()} PLN M`;
            }
        }
        document.querySelector('#projTable tbody').innerHTML = tableHTML;
    }

    inputs.forEach(id => document.getElementById(id).addEventListener('input', updateModel));
    updateModel(); // Initial run
</script>

</body>
</html>
