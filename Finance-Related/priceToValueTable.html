        function parseRgb(rgbString) {
            const match = rgbString.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
            return match ? [parseInt(match[1]), parseInt(match[2]), parseInt(match[3])] : null;
        }

        function interpolateColor(color1, color2, factor) {
            const result = color1.map((c1, i) => Math.round(c1 + factor * (color2[i] - c1)));
            return `rgb(${result[0]}, ${result[1]}, ${result[2]})`;
        }

        function getColorForDeviation(deviationRatio) {
            const neutral = [255, 255, 255];
            const lightGreen = [212, 237, 218];
            const darkGreen = [25, 111, 61];
            const lightRed = [248, 215, 218];
            const darkRed = [176, 58, 46];

            const maxAbsoluteDeviation = 1.0;
            const clampedRatio = Math.max(-maxAbsoluteDeviation, Math.min(maxAbsoluteDeviation, deviationRatio));
            const neutralThreshold = 0.02;

            if (clampedRatio > neutralThreshold) {
                const factor = (clampedRatio - neutralThreshold) / (maxAbsoluteDeviation - neutralThreshold);
                return interpolateColor(lightRed, darkRed, factor);
            } else if (clampedRatio < -neutralThreshold) {
                const factor = (Math.abs(clampedRatio) - neutralThreshold) / (maxAbsoluteDeviation - neutralThreshold);
                return interpolateColor(lightGreen, darkGreen, factor);
            } else {
                return `rgb(${neutral[0]}, ${neutral[1]}, ${neutral[2]})`;
            }
        }

        function getContrastTextColor(rgbString) {
            const rgb = parseRgb(rgbString);
            if (!rgb) return 'black';

            const r = rgb[0];
            const g = rgb[1];
            const b = rgb[2];

            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.5 ? 'black' : 'white';
        }

        function parseAndProcessData(rawData, companyList) {
            const lines = rawData.trim().split('\n');
            return lines.map((line, index) => {
                const parts = line.split('\t');
                const price = parseFloat(parts[0].replace(',', '.'));
                const expectedValue = parseFloat(parts[1].replace(',', '.'));

                let deviationRatio = 0;
                if (expectedValue !== 0) {
                    deviationRatio = (price - expectedValue) / expectedValue;
                }

                return {
                    company: companyList[index] || 'Unknown',
                    price: price,
                    expectedValue: expectedValue,
                    deviationRatio: deviationRatio,
                    deviationPercent: (deviationRatio * 100).toFixed(2) + '%'
                };
            });
        }

        function renderTable(processedData) {
            const tableBody = document.getElementById('valuationTable').getElementsByTagName('tbody')[0];
            tableBody.innerHTML = '';

            processedData.forEach(item => {
                const row = tableBody.insertRow();

                const companyCell = row.insertCell();
                companyCell.textContent = item.company;

                const priceCell = row.insertCell();
                priceCell.textContent = item.price.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 });

                const expectedCell = row.insertCell();
                expectedCell.textContent = item.expectedValue.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 4 });

                const deviationCell = row.insertCell();
                deviationCell.textContent = item.deviationPercent;

                const bgColor = getColorForDeviation(item.deviationRatio);
                deviationCell.style.backgroundColor = bgColor;
                deviationCell.style.color = getContrastTextColor(bgColor);
                deviationCell.style.fontWeight = 'bold';
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const processedData = parseAndProcessData(data, companies);
            // Sort by deviation ratio from lowest to highest
            processedData.sort((a, b) => a.deviationRatio - b.deviationRatio);
            renderTable(processedData);
        });
